services:
  - type: web
    name: opinion-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DEEPSEEK_API_KEY
        sync: false   # 部署后在 Render Dashboard 手动填
    disk:            # 免费 1GB 磁盘,SQLite 数据持久化
      name: opinion-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
