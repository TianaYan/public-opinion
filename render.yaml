services:
  - type: web
    name: opinion-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DEEPSEEK_API_KEY
        sync: false   # 部署后在 Render Dashboard 手动填
